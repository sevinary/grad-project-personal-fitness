spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true # <--- 이 옵션이 핵심입니다!
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console